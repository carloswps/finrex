name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.0.0
      - uses: actions/setup-node@v4.0.0
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run biome:check
      - run: npm tsx --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_URL_FINREX_API:
            ${{ secrets.NEXT_PUBLIC_URL_FINREX_API || 'http://localhost:3000' }}